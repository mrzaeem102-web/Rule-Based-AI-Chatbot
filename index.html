<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule Based AI Chatbot</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="sidebar">
            <h2>🤖 AI Chatbot</h2>

            <ul>
                <li>🏠 Dashboard</li>
                <li>💬 Chat</li>
                <li>📋 Commands</li>
                <li>⚙ Settings</li>
                <li>ℹ About</li>
            </ul>
        </div>

        <div class="chat-section">

            <div class="header">
                <h1>Rule-Based AI Chatbot</h1>
                <button id="clearBtn">Clear Chat</button>
            </div>

            <div class="chat-box" id="chatBox">

                <div class="bot-message">
                    Hello! 👋 I am your Rule-Based AI Chatbot.
                </div>

            </div>

            <div class="input-area">

                <input
                    type="text"
                    id="userInput"
                    placeholder="Type your message...">

                <button onclick="sendMessage()">Send</button>

            </div>

        </div>

        <div class="stats">

            <h3>📊 Statistics</h3>

            <p>Total Messages: <span id="total">0</span></p>

            <p>User Messages: <span id="userCount">0</span></p>

            <p>Bot Messages: <span id="botCount">0</span></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
